<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Loyfer - מחולל שמות לתינוק</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.8s ease;
  }

  body.girl-mode {
    background: linear-gradient(135deg, #1a0a1e 0%, #2d1233 30%, #1e0a2e 60%, #120818 100%);
  }
  body.boy-mode {
    background: linear-gradient(135deg, #0a1a1e 0%, #122d33 30%, #0a1e2e 60%, #081218 100%);
  }

  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0% { opacity: 0.1; } 100% { opacity: var(--max-o); } }

  .container {
    position: relative; z-index: 1;
    max-width: 600px; margin: 0 auto; padding: 40px 20px;
    text-align: center;
  }

  .header-badge {
    display: inline-block; padding: 6px 20px; border-radius: 50px;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 16px; font-weight: 500;
    transition: all 0.5s ease;
  }
  .girl-mode .header-badge { background: rgba(236,72,153,0.15); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.3); }
  .boy-mode .header-badge { background: rgba(56,189,248,0.15); color: #7dd3fc; border: 1px solid rgba(56,189,248,0.3); }

  h1 {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: 42px; line-height: 1.1; margin-bottom: 8px;
    transition: color 0.5s ease;
  }
  .girl-mode h1 { color: #fce7f3; }
  .boy-mode h1 { color: #e0f2fe; }

  .subtitle {
    font-size: 15px; font-weight: 300; margin-bottom: 36px;
    transition: color 0.5s ease;
  }
  .girl-mode .subtitle { color: #d8b4d8; }
  .boy-mode .subtitle { color: #94d8e8; }

  .eve-note {
    font-size: 13px; font-style: italic; margin-bottom: 30px;
    padding: 12px 20px; border-radius: 12px;
    transition: all 0.5s ease;
  }
  .girl-mode .eve-note { color: #f9a8d4; background: rgba(236,72,153,0.08); }
  .boy-mode .eve-note { color: #7dd3fc; background: rgba(56,189,248,0.08); }

  /* GENDER TOGGLE */
  .toggle-section { margin-bottom: 30px; }
  .toggle-label { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
  .girl-mode .toggle-label { color: #d8b4d8; }
  .boy-mode .toggle-label { color: #94d8e8; }

  .toggle-wrapper {
    display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 10px;
  }
  .toggle-option {
    font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s;
    padding: 4px 0;
  }
  .toggle-option.active-girl { color: #ec4899; text-shadow: 0 0 20px rgba(236,72,153,0.5); }
  .toggle-option.active-boy { color: #38bdf8; text-shadow: 0 0 20px rgba(56,189,248,0.5); }
  .toggle-option.inactive { color: #555; }

  .toggle-track {
    width: 64px; height: 32px; border-radius: 16px; cursor: pointer;
    position: relative; transition: background 0.4s ease;
  }
  .girl-mode .toggle-track { background: linear-gradient(135deg, #ec4899, #a855f7); }
  .boy-mode .toggle-track { background: linear-gradient(135deg, #38bdf8, #6366f1); }

  .toggle-thumb {
    width: 26px; height: 26px; border-radius: 50%; background: white;
    position: absolute; top: 3px; transition: left 0.3s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .girl-mode .toggle-thumb { right: 35px; left: auto; }
  .boy-mode .toggle-thumb { right: 3px; left: auto; }

  /* CATEGORY SELECT */
  .category-section { margin-bottom: 30px; }
  .category-label {
    font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    font-weight: 500; margin-bottom: 10px;
  }
  .girl-mode .category-label { color: #d8b4d8; }
  .boy-mode .category-label { color: #94d8e8; }

  .category-grid {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .cat-btn {
    padding: 8px 16px; border-radius: 20px; border: 1px solid;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.3s ease; background: transparent;
    font-family: 'Inter', sans-serif;
  }
  .girl-mode .cat-btn { color: #d8b4d8; border-color: rgba(236,72,153,0.25); }
  .girl-mode .cat-btn:hover { background: rgba(236,72,153,0.15); border-color: #ec4899; }
  .girl-mode .cat-btn.active { background: rgba(236,72,153,0.25); border-color: #ec4899; color: #f9a8d4; }
  .boy-mode .cat-btn { color: #94d8e8; border-color: rgba(56,189,248,0.25); }
  .boy-mode .cat-btn:hover { background: rgba(56,189,248,0.15); border-color: #38bdf8; }
  .boy-mode .cat-btn.active { background: rgba(56,189,248,0.25); border-color: #38bdf8; color: #7dd3fc; }

  /* CUSTOM TOPIC */
  .custom-topic {
    margin-top: 12px; display: flex; gap: 8px; justify-content: center;
  }
  .custom-input {
    padding: 8px 16px; border-radius: 20px; border: 1px solid;
    font-size: 13px; font-family: 'Inter', sans-serif;
    background: rgba(255,255,255,0.05); outline: none; width: 200px;
  }
  .girl-mode .custom-input { color: #f9a8d4; border-color: rgba(236,72,153,0.3); }
  .boy-mode .custom-input { color: #7dd3fc; border-color: rgba(56,189,248,0.3); }
  .custom-input::placeholder { opacity: 0.4; }
  .add-btn {
    padding: 8px 16px; border-radius: 20px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .girl-mode .add-btn { background: #ec4899; color: white; }
  .boy-mode .add-btn { background: #38bdf8; color: #0a1a1e; }

  /* GENERATE BUTTON */
  .generate-btn {
    padding: 18px 50px; border-radius: 50px; border: none;
    font-size: 18px; font-weight: 700; cursor: pointer;
    font-family: 'Playfair Display', serif; letter-spacing: 1px;
    transition: all 0.3s ease; margin-bottom: 40px;
    position: relative; overflow: hidden;
  }
  .girl-mode .generate-btn {
    background: linear-gradient(135deg, #ec4899, #a855f7);
    color: white; box-shadow: 0 4px 30px rgba(236,72,153,0.4);
  }
  .girl-mode .generate-btn:hover { transform: scale(1.05); box-shadow: 0 6px 40px rgba(236,72,153,0.6); }
  .boy-mode .generate-btn {
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white; box-shadow: 0 4px 30px rgba(56,189,248,0.4);
  }
  .boy-mode .generate-btn:hover { transform: scale(1.05); box-shadow: 0 6px 40px rgba(56,189,248,0.6); }
  .generate-btn:active { transform: scale(0.98); }

  /* RESULT CARD */
  .result-card {
    padding: 40px 30px; border-radius: 24px; margin-bottom: 30px;
    transition: all 0.5s ease; position: relative; overflow: hidden;
    display: none;
  }
  .result-card.visible { display: block; animation: cardReveal 0.6s ease forwards; }
  @keyframes cardReveal {
    0% { opacity: 0; transform: translateY(30px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .girl-mode .result-card { background: rgba(236,72,153,0.08); border: 1px solid rgba(236,72,153,0.2); }
  .boy-mode .result-card { background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.2); }

  .result-category {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 500; margin-bottom: 8px;
  }
  .girl-mode .result-category { color: #ec4899; }
  .boy-mode .result-category { color: #38bdf8; }

  .result-name {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: 52px; line-height: 1.1; margin-bottom: 4px;
    transition: color 0.5s;
    direction: ltr;
  }
  .girl-mode .result-name { color: #fce7f3; }
  .boy-mode .result-name { color: #e0f2fe; }

  .result-nikud {
    font-size: 32px; font-weight: 400; margin-bottom: 8px;
    direction: rtl;
  }
  .girl-mode .result-nikud { color: #f9a8d4; }
  .boy-mode .result-nikud { color: #7dd3fc; }

  .result-surname {
    font-family: 'Playfair Display', serif; font-weight: 400;
    font-size: 28px; letter-spacing: 4px; margin-bottom: 16px;
  }
  .girl-mode .result-surname { color: #d8b4d8; }
  .boy-mode .result-surname { color: #94d8e8; }

  .result-origin {
    font-size: 14px; font-weight: 500; margin-bottom: 8px;
  }
  .girl-mode .result-origin { color: #f9a8d4; }
  .boy-mode .result-origin { color: #7dd3fc; }

  .result-desc {
    font-size: 14px; font-weight: 300; line-height: 1.6; margin-bottom: 12px;
  }
  .girl-mode .result-desc { color: #c9a0c9; }
  .boy-mode .result-desc { color: #80c4d4; }

  .result-meaning {
    font-size: 13px; font-style: italic; padding: 10px 16px;
    border-radius: 10px; display: inline-block;
  }
  .girl-mode .result-meaning { color: #f9a8d4; background: rgba(236,72,153,0.1); }
  .boy-mode .result-meaning { color: #7dd3fc; background: rgba(56,189,248,0.1); }

  /* FAVORITES */
  .fav-btn {
    margin-top: 16px; padding: 10px 24px; border-radius: 50px;
    border: 1px solid; font-size: 14px; cursor: pointer;
    background: transparent; font-family: 'Inter', sans-serif;
    font-weight: 500; transition: all 0.3s;
  }
  .girl-mode .fav-btn { color: #f9a8d4; border-color: rgba(236,72,153,0.4); }
  .girl-mode .fav-btn:hover { background: rgba(236,72,153,0.2); }
  .boy-mode .fav-btn { color: #7dd3fc; border-color: rgba(56,189,248,0.4); }
  .boy-mode .fav-btn:hover { background: rgba(56,189,248,0.2); }

  .favorites-section { margin-top: 20px; }
  .favorites-title {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 500; margin-bottom: 12px;
  }
  .girl-mode .favorites-title { color: #d8b4d8; }
  .boy-mode .favorites-title { color: #94d8e8; }

  .fav-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .fav-chip {
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
    font-weight: 500; cursor: pointer; transition: all 0.3s;
  }
  .girl-mode .fav-chip { background: rgba(236,72,153,0.15); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.3); }
  .boy-mode .fav-chip { background: rgba(56,189,248,0.15); color: #7dd3fc; border: 1px solid rgba(56,189,248,0.3); }
  .fav-chip:hover { opacity: 0.7; }

  .footer {
    margin-top: 40px; font-size: 12px; font-weight: 300;
  }
  .girl-mode .footer { color: #6b4570; }
  .boy-mode .footer { color: #3a6070; }

  /* PROFILE SCREEN */
  .profile-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 100; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a0a1e 0%, #2d1233 30%, #1e0a2e 60%, #120818 100%);
  }
  .profile-screen.hidden { display: none; }
  .profile-title {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: 32px; color: #fce7f3; margin-bottom: 8px;
  }
  .profile-subtitle {
    font-size: 14px; color: #d8b4d8; margin-bottom: 30px; font-weight: 300;
  }
  .profile-grid {
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
    max-width: 400px;
  }
  .profile-btn {
    padding: 14px 28px; border-radius: 16px; border: 2px solid rgba(236,72,153,0.3);
    background: rgba(236,72,153,0.08); color: #f9a8d4;
    font-size: 18px; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.3s ease;
    min-width: 100px;
  }
  .profile-btn:hover {
    background: rgba(236,72,153,0.25); border-color: #ec4899;
    transform: scale(1.05); box-shadow: 0 4px 20px rgba(236,72,153,0.3);
  }

  .current-profile {
    display: inline-block; padding: 4px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    margin-bottom: 16px;
  }
  .girl-mode .current-profile { background: rgba(236,72,153,0.15); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.3); }
  .boy-mode .current-profile { background: rgba(56,189,248,0.15); color: #7dd3fc; border: 1px solid rgba(56,189,248,0.3); }

  .fav-voters {
    font-size: 11px; margin-top: 2px; opacity: 0.7;
  }
  .fav-chip { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body class="girl-mode">

<div class="profile-screen" id="profile-screen">
  <div class="profile-title">שלום משפחת לויפר!</div>
  <div class="profile-subtitle">מי את/ה?</div>
  <div class="profile-grid" id="profile-grid"></div>
</div>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="current-profile" id="current-profile" onclick="showProfileScreen()"></div>
  <div class="header-badge">Loyfer Family Expansion Pack</div>
  <h1>איך נקרא<br>לבייבי לויפר?</h1>
  <p class="subtitle">כי "יובל" אף פעם לא היה אופציה</p>
  <p class="eve-note">לאיב ואורן. מיקאסה עומדת להפוך לאחות גדולה.</p>

  <div class="toggle-section">
    <div class="toggle-label">אנחנו מחפשים שם ל...</div>
    <div class="toggle-wrapper">
      <span class="toggle-option active-girl" id="opt-girl" onclick="setGender('girl')">בת</span>
      <div class="toggle-track" id="toggle-track" onclick="toggleGender()">
        <div class="toggle-thumb" id="toggle-thumb"></div>
      </div>
      <span class="toggle-option inactive" id="opt-boy" onclick="setGender('boy')">בן</span>
    </div>
  </div>

  <div class="category-section">
    <div class="category-label">בחרו יקום</div>
    <div class="category-grid" id="category-grid"></div>
    <div class="custom-topic">
      <input type="text" class="custom-input" id="custom-input" placeholder="...הוסיפו נושא משלכם" dir="rtl">
      <button class="add-btn" onclick="addCustomTopic()">+ הוסף</button>
    </div>
  </div>

  <button class="generate-btn" onclick="generateName()">גלו שם!</button>

  <div class="result-card" id="result-card">
    <div class="result-category" id="result-category"></div>
    <div class="result-name" id="result-name"></div>
    <div class="result-nikud" id="result-nikud"></div>
    <div class="result-surname">LOYFER</div>
    <div class="result-origin" id="result-origin"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="result-meaning" id="result-meaning"></div>
    <br>
    <button class="fav-btn" onclick="addFavorite()">שמור למועדפים</button>
  </div>

  <div class="favorites-section" id="favorites-section" style="display:none">
    <div class="favorites-title">המועדפים שלנו</div>
    <div class="fav-list" id="fav-list"></div>
  </div>

  <div class="footer">
    נוצר באהבה עבור האמא הכי יפה בישראל<br>
    מיקאסה לויפר אישרה את ההודעה הזו
  </div>
</div>

<script>
let gender = 'girl';
let activeCategories = new Set(['All']);
let favorites = JSON.parse(localStorage.getItem('loyfer-favorites-v2') || '[]');
let currentName = null;
let usedNames = new Set();
let currentProfile = localStorage.getItem('loyfer-profile') || null;
const profiles = ['באבא', 'תאתא', 'ניר', 'אמא', 'אבא'];

const nameBank = {
  "One Piece": {
    girl: [
      { name: "Nami", nikud: "נָאמִי", origin: "One Piece", desc: "הנווטת הגאונית של צוות כובע הקש. שרדה גיהינום, בחרה בחופש, והערימה על כולם.", meaning: "גל ביפנית" },
      { name: "Robin", nikud: "רוֹבִּין", origin: "One Piece", desc: "ניקו רובין. השורדת האחרונה של אוהרה, ארכיאולוגית שיכולה לקרוא את השפה העתיקה.", meaning: "תהילה בוהקת" },
      { name: "Vivi", nikud: "וִיוִי", origin: "One Piece", desc: "הנסיכה נפרטרי ויוי. עזבה את הכס שלה כדי להילחם לצד פיראטים ולהציל את הממלכה.", meaning: "חיים, חיה" },
      { name: "Uta", nikud: "אוּטָה", origin: "One Piece Film: Red", desc: "הדיווה הגדולה בעולם עם קול שחוצה ממדים. הבת של שאנקס.", meaning: "שיר ביפנית" },
      { name: "Reiju", nikud: "רֵיג׳וּ", origin: "One Piece", desc: "וינסמוק רייג׳ו, הורד הרעיל. האחות היחידה עם נשמה. נסיכה לוחמת.", meaning: "אפס-שתיים ביפנית" },
      { name: "Hiyori", nikud: "הִיוֹרִי", origin: "One Piece", desc: "נסיכת וואנו. שרדה 20 שנה במסווה בהמתנה לשחרר את מולדתה.", meaning: "יום טוב, שמש" },
      { name: "Koala", nikud: "קוֹאָלָה", origin: "One Piece", desc: "עבדה לשעבר שהפכה למפקדת הצבא המהפכני. נלחמת לשחרר את העולם.", meaning: "סמל של חוסן" },
      { name: "Bonney", nikud: "בּוֹנִי", origin: "One Piece", desc: "קפטנית פיראטים מסופרנובה שיכולה לשלוט בגיל. אנרגיה של כאוס טהור.", meaning: "על שם הפיראטית אן בוני" },
      { name: "Toki", nikud: "טוֹקִי", origin: "One Piece", desc: "אישה שנוסעת בזמן ששלחה את הסמוראים 20 שנה קדימה כדי להציל את וואנו.", meaning: "זמן ביפנית" },
      { name: "Hina", nikud: "הִינָה", origin: "One Piece", desc: "קפטנית של חיל הים עם כוחות כלוב ברזל. עוברת דרך אויבים וכולאת אותם מיד.", meaning: "שמש ביפנית" },
      { name: "Perona", nikud: "פֶּרוֹנָה", origin: "One Piece", desc: "נסיכת רוחות גותית שהכוחות שלה גורמים לאויבים לאבד כל רצון להילחם.", meaning: "מפרספונה" },
      { name: "Boa", nikud: "בּוֹאָה", origin: "One Piece", desc: "בואה הנקוק. קיסרית הלוחמות של אמזון לילי. היפה בעולם, עם עיני מדוזה שמאבנות גברים.", meaning: "נחש, עוצמה" },
      { name: "Yamato", nikud: "יָמָאטוֹ", origin: "One Piece", desc: "הבת של קייידו שסירבה לחיות חיי כלא. לוחמת עם כוח של אוקדן.", meaning: "השם העתיק של יפן" },
      { name: "Rebecca", nikud: "רֶבֶּקָה", origin: "One Piece", desc: "גלדיאטורית נסיכה מדרספרוזה שמעולם לא הצליחה לפגוע ביריב — כי היא טובה מכדי לפצוע.", meaning: "קושרת, מחברת" },
      { name: "Viola", nikud: "וִיאוֹלָה", origin: "One Piece", desc: "נסיכת דרספרוזה. רקדנית עם עין-עוף שרואה כל דבר בטווח של 4,000 קילומטר.", meaning: "פרח הסגול" },

const categories = Object.keys(nameBank);
let customCategories = {};

function init() {
  createStars();
  renderCategories();
  renderFavorites();
  renderProfileScreen();
  if (!currentProfile) {
    document.getElementById('profile-screen').classList.remove('hidden');
  } else {
    document.getElementById('profile-screen').classList.add('hidden');
    updateProfileBadge();
  }
}

function renderProfileScreen() {
  const grid = document.getElementById('profile-grid');
  grid.innerHTML = '';
  profiles.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'profile-btn';
    btn.textContent = p;
    btn.onclick = () => selectProfile(p);
    grid.appendChild(btn);
  });
}

function selectProfile(name) {
  currentProfile = name;
  localStorage.setItem('loyfer-profile', name);
  document.getElementById('profile-screen').classList.add('hidden');
  updateProfileBadge();
}

function showProfileScreen() {
  document.getElementById('profile-screen').classList.remove('hidden');
}

function updateProfileBadge() {
  const badge = document.getElementById('current-profile');
  badge.textContent = currentProfile + ' \u270B';
}

function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
    star.style.setProperty('--max-o', Math.random() * 0.6 + 0.2);
    star.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(star);
  }
}

function setGender(g) {
  gender = g;
  document.body.className = g + '-mode';
  document.getElementById('opt-girl').className = 'toggle-option ' + (g === 'girl' ? 'active-girl' : 'inactive');
  document.getElementById('opt-boy').className = 'toggle-option ' + (g === 'boy' ? 'active-boy' : 'inactive');
}

function toggleGender() {
  setGender(gender === 'girl' ? 'boy' : 'girl');
}

function renderCategories() {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn' + (activeCategories.has('All') ? ' active' : '');
  allBtn.textContent = 'הכל';
  allBtn.onclick = () => { activeCategories.clear(); activeCategories.add('All'); renderCategories(); };
  grid.appendChild(allBtn);

  const allCats = [...categories, ...Object.keys(customCategories)];
  allCats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCategories.has(cat) ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      activeCategories.delete('All');
      if (activeCategories.has(cat)) activeCategories.delete(cat);
      else activeCategories.add(cat);
      if (activeCategories.size === 0) activeCategories.add('All');
      renderCategories();
    };
    grid.appendChild(btn);
  });
}

function addCustomTopic() {
  const input = document.getElementById('custom-input');
  const topic = input.value.trim();
  if (!topic) return;

  if (!customCategories[topic]) {
    customCategories[topic] = { girl: [], boy: [] };
    // Placeholder — users can expand
    customCategories[topic].girl.push({ name: "?", origin: topic, desc: "Add names from " + topic + " — coming soon!", meaning: "Custom category" });
    customCategories[topic].boy.push({ name: "?", origin: topic, desc: "Add names from " + topic + " — coming soon!", meaning: "Custom category" });
  }

  activeCategories.delete('All');
  activeCategories.add(topic);
  input.value = '';
  renderCategories();
}

function generateName() {
  let pool = [];
  const activeCats = activeCategories.has('All') ? categories : [...activeCategories];

  activeCats.forEach(cat => {
    const bank = nameBank[cat] || customCategories[cat];
    if (bank && bank[gender]) {
      bank[gender].forEach(entry => {
        if (!usedNames.has(entry.name + '-' + gender)) {
          pool.push({ ...entry, category: cat });
        }
      });
    }
  });

  // Reset if all used
  if (pool.length === 0) {
    usedNames.clear();
    activeCats.forEach(cat => {
      const bank = nameBank[cat] || customCategories[cat];
      if (bank && bank[gender]) {
        bank[gender].forEach(entry => pool.push({ ...entry, category: cat }));
      }
    });
  }

  if (pool.length === 0) return;

  const pick = pool[Math.floor(Math.random() * pool.length)];
  usedNames.add(pick.name + '-' + gender);
  currentName = pick;

  const card = document.getElementById('result-card');
  card.classList.remove('visible');

  setTimeout(() => {
    document.getElementById('result-category').textContent = pick.category;
    document.getElementById('result-name').textContent = pick.name.toUpperCase();
    document.getElementById('result-nikud').textContent = pick.nikud || '';
    document.getElementById('result-origin').textContent = pick.origin;
    document.getElementById('result-desc').textContent = pick.desc;
    document.getElementById('result-meaning').textContent = pick.meaning ? 'משמעות: ' + pick.meaning : '';
    card.classList.add('visible');
  }, 100);
}

function addFavorite() {
  if (!currentName || !currentProfile) return;
  const key = currentName.name + '-' + gender;
  let existing = favorites.find(f => f.key === key);
  if (existing) {
    if (!existing.voters.includes(currentProfile)) {
      existing.voters.push(currentProfile);
    }
  } else {
    favorites.push({ key, name: currentName.name, gender, category: currentName.category, voters: [currentProfile] });
  }
  localStorage.setItem('loyfer-favorites-v2', JSON.stringify(favorites));
  renderFavorites();
}

function removeVote(key) {
  if (!currentProfile) return;
  let entry = favorites.find(f => f.key === key);
  if (entry) {
    entry.voters = entry.voters.filter(v => v !== currentProfile);
    if (entry.voters.length === 0) {
      favorites = favorites.filter(f => f.key !== key);
    }
  }
  localStorage.setItem('loyfer-favorites-v2', JSON.stringify(favorites));
  renderFavorites();
}

function renderFavorites() {
  const section = document.getElementById('favorites-section');
  const list = document.getElementById('fav-list');
  if (favorites.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = '';
  // Sort by most votes first
  const sorted = [...favorites].sort((a, b) => b.voters.length - a.voters.length);
  sorted.forEach(f => {
    const chip = document.createElement('span');
    chip.className = 'fav-chip';
    const icon = f.gender === 'girl' ? '\u2640' : '\u2642';
    const nameEl = document.createElement('span');
    nameEl.textContent = icon + ' ' + f.name + ' Loyfer';
    const votersEl = document.createElement('span');
    votersEl.className = 'fav-voters';
    votersEl.textContent = f.voters.join(' \u2022 ');
    chip.appendChild(nameEl);
    chip.appendChild(votersEl);
    chip.title = 'לחץ כדי להסיר את ההצבעה שלך';
    chip.onclick = () => removeVote(f.key);
    list.appendChild(chip);
  });
}

init();
</script>
