  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.8s ease;
  }

  body.girl-mode {
    background: linear-gradient(135deg, #1a0a1e 0%, #2d1233 30%, #1e0a2e 60%, #120818 100%);

  body.boy-mode {
    background: linear-gradient(135deg, #0a1a1e 0%, #122d33 30%, #0a1e2e 60%, #081218 100%);
  }

  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0% { opacity: 0.1; } 100% { opacity: var(--max-o); } }

  .container {
    position: relative; z-index: 1;
    max-width: 600px; margin: 0 auto; padding: 40px 20px;
    text-align: center;
  }

  .header-badge {
    display: inline-block; padding: 6px 20px; border-radius: 50px;
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 16px; font-weight: 500;
    transition: all 0.5s ease;
  }
  .girl-mode .header-badge { background: rgba(236,72,153,0.15); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.3); }
  .boy-mode .header-badge { background: rgba(56,189,248,0.15); color: #7dd3fc; border: 1px solid rgba(56,189,248,0.3); }

  h1 {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: 42px; line-height: 1.1; margin-bottom: 8px;

  }
  .girl-mode h1 { color: #fce7f3; }
  .boy-mode h1 { color: #e0f2fe; }

  .subtitle {
    font-size: 15px; font-weight: 300; margin-bottom: 36px;
    transition: color 0.5s ease;
  }
  .girl-mode .subtitle { color: #d8b4d8; }
  .boy-mode .subtitle { color: #94d8e8; }

  .eve-note {
    font-size: 13px; font-style: italic; margin-bottom: 30px;
    padding: 12px 20px; border-radius: 12px;
    transition: all 0.5s ease;
  }
  .girl-mode .eve-note { color: #f9a8d4; background: rgba(236,72,153,0.08); }
  .boy-mode .eve-note { color: #7dd3fc; background: rgba(56,189,248,0.08); }

  .toggle-label { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
  .girl-mode .toggle-label { color: #d8b4d8; }
  .boy-mode .toggle-label { color: #94d8e8; }

  .toggle-wrapper {
    display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 10px;
  }
  .toggle-option {
    font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s;
    padding: 4px 0;
  }
  .toggle-option.active-girl { color: #ec4899; text-shadow: 0 0 20px rgba(236,72,153,0.5); }
  .toggle-option.active-boy { color: #38bdf8; text-shadow: 0 0 20px rgba(56,189,248,0.5); }
  .toggle-option.inactive { color: #555; }

  .toggle-track {
    width: 64px; height: 32px; border-radius: 16px; cursor: pointer;
    position: relative; transition: background 0.4s ease;
  }
  .girl-mode .toggle-track { background: linear-gradient(135deg, #ec4899, #a855f7); }
  .boy-mode .toggle-track { background: linear-gradient(135deg, #38bdf8, #6366f1); }

  .toggle-thumb {
    width: 26px; height: 26px; border-radius: 50%; background: white;
    position: absolute; top: 3px; transition: left 0.3s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .girl-mode .toggle-thumb { right: 35px; left: auto; }
  .boy-mode .toggle-thumb { right: 3px; left: auto; }

  .category-label {
    font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    font-weight: 500; margin-bottom: 10px;
  }
  .girl-mode .category-label { color: #d8b4d8; }
  .boy-mode .category-label { color: #94d8e8; }

  .category-grid {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .cat-btn {
    padding: 8px 16px; border-radius: 20px; border: 1px solid;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.3s ease; background: transparent;
    font-family: 'Inter', sans-serif;
  }
  .girl-mode .cat-btn { color: #d8b4d8; border-color: rgba(236,72,153,0.25); }
  .girl-mode .cat-btn:hover { background: rgba(236,72,153,0.15); border-color: #ec4899; }
  .girl-mode .cat-btn.active { background: rgba(236,72,153,0.25); border-color: #ec4899; color: #f9a8d4; }
  .boy-mode .cat-btn { color: #94d8e8; border-color: rgba(56,189,248,0.25); }
  .boy-mode .cat-btn:hover { background: rgba(56,189,248,0.15); border-color: #38bdf8; }
  .boy-mode .cat-btn.active { background: rgba(56,189,248,0.25); border-color: #38bdf8; color: #7dd3fc; }

  /* CUSTOM TOPIC */
  .custom-topic {
    margin-top: 12px; display: flex; gap: 8px; justify-content: center;
  }
  .custom-input {
    padding: 8px 16px; border-radius: 20px; border: 1px solid;
    font-size: 13px; font-family: 'Inter', sans-serif;
    background: rgba(255,255,255,0.05); outline: none; width: 200px;
  }
  .girl-mode .custom-input { color: #f9a8d4; border-color: rgba(236,72,153,0.3); }
  .boy-mode .custom-input { color: #7dd3fc; border-color: rgba(56,189,248,0.3); }
  .custom-input::placeholder { opacity: 0.4; }
  .add-btn {
    padding: 8px 16px; border-radius: 20px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .girl-mode .add-btn { background: #ec4899; color: white; }
  .boy-mode .add-btn { background: #38bdf8; color: #0a1a1e; }

  /* GENERATE BUTTON */
  .generate-btn {
    padding: 18px 50px; border-radius: 50px; border: none;
    font-size: 18px; font-weight: 700; cursor: pointer;
    font-family: 'Playfair Display', serif; letter-spacing: 1px;
    transition: all 0.3s ease; margin-bottom: 40px;
    position: relative; overflow: hidden;

  .girl-mode .generate-btn {

    color: white; box-shadow: 0 4px 30px rgba(236,72,153,0.4);

  .boy-mode .generate-btn {

  .result-card.visible { display: block; animation: cardReveal 0.6s ease forwards; }

    0% { opacity: 0; transform: translateY(30px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }

  .girl-mode .result-card { background: rgba(236,72,153,0.08); border: 1px solid rgba(236,72,153,0.2); }
  .boy-mode .result-card { background: rgba(56,189,248,0.08); border: 1px solid rgba(56,189,248,0.2); }

  .boy-mode .result-category { color: #38bdf8; }

  .boy-mode .result-name { color: #e0f2fe; }

  .boy-mode .result-surname { color: #94d8e8; }

  .result-origin {

  .girl-mode .result-origin { color: #f9a8d4; }
  .boy-mode .result-origin { color: #7dd3fc; }

  .boy-mode .result-meaning { color: #7dd3fc; background: rgba(56,189,248,0.1); }

  .boy-mode .fav-btn { color: #7dd3fc; border-color: rgba(56,189,248,0.4); }

  .boy-mode .favorites-title { color: #94d8e8; }

  .fav-chip {
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
    font-weight: 500; cursor: pointer; transition: all 0.3s;
  }
  .girl-mode .fav-chip { background: rgba(236,72,153,0.15); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.3); }
  .boy-mode .fav-chip { background: rgba(56,189,248,0.15); color: #7dd3fc; border: 1px solid rgba(56,189,248,0.3); }
  .fav-chip:hover { opacity: 0.7; }

  .footer {
    margin-top: 40px; font-size: 12px; font-weight: 300;
  }
  .girl-mode .footer { color: #6b4570; }
  .boy-mode .footer { color: #3a6070; }
</style>

const categories = Object.keys(nameBank);
let customCategories = {};

function init() {
  createStars();
  renderCategories();
  renderFavorites();
}

function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
    star.style.setProperty('--max-o', Math.random() * 0.6 + 0.2);
    star.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(star);
  }
}

function setGender(g) {
  gender = g;
  document.body.className = g + '-mode';
  document.getElementById('opt-girl').className = 'toggle-option ' + (g === 'girl' ? 'active-girl' : 'inactive');
  document.getElementById('opt-boy').className = 'toggle-option ' + (g === 'boy' ? 'active-boy' : 'inactive');
}

function toggleGender() {
  setGender(gender === 'girl' ? 'boy' : 'girl');
}

function renderCategories() {
  const grid = document.getElementById('category-grid');
  grid.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn' + (activeCategories.has('All') ? ' active' : '');
  allBtn.textContent = 'הכל';
  allBtn.onclick = () => { activeCategories.clear(); activeCategories.add('All'); renderCategories(); };
  grid.appendChild(allBtn);

  const allCats = [...categories, ...Object.keys(customCategories)];
  allCats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCategories.has(cat) ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      activeCategories.delete('All');
      if (activeCategories.has(cat)) activeCategories.delete(cat);
      else activeCategories.add(cat);
      if (activeCategories.size === 0) activeCategories.add('All');
      renderCategories();
    };
    grid.appendChild(btn);
  });
}

function addCustomTopic() {
  const input = document.getElementById('custom-input');
  const topic = input.value.trim();
  if (!topic) return;

  if (!customCategories[topic]) {
    customCategories[topic] = { girl: [], boy: [] };
    // Placeholder — users can expand
    customCategories[topic].girl.push({ name: "?", origin: topic, desc: "Add names from " + topic + " — coming soon!", meaning: "Custom category" });
    customCategories[topic].boy.push({ name: "?", origin: topic, desc: "Add names from " + topic + " — coming soon!", meaning: "Custom category" });
  }

  activeCategories.delete('All');
  activeCategories.add(topic);
  input.value = '';
  renderCategories();
}

function generateName() {
  let pool = [];
  const activeCats = activeCategories.has('All') ? categories : [...activeCategories];

  activeCats.forEach(cat => {
    const bank = nameBank[cat] || customCategories[cat];
    if (bank && bank[gender]) {
      bank[gender].forEach(entry => {
        if (!usedNames.has(entry.name + '-' + gender)) {
          pool.push({ ...entry, category: cat });
        }
      });
    }
  });

  // Reset if all used
  if (pool.length === 0) {
    usedNames.clear();
    activeCats.forEach(cat => {
      const bank = nameBank[cat] || customCategories[cat];
      if (bank && bank[gender]) {
        bank[gender].forEach(entry => pool.push({ ...entry, category: cat }));
      }
    });
  }

  if (pool.length === 0) return;

  const pick = pool[Math.floor(Math.random() * pool.length)];
  usedNames.add(pick.name + '-' + gender);
  currentName = pick;

  const card = document.getElementById('result-card');
  card.classList.remove('visible');

  setTimeout(() => {
    document.getElementById('result-category').textContent = pick.category;
    document.getElementById('result-name').textContent = pick.name.toUpperCase();
    document.getElementById('result-origin').textContent = pick.origin;
    document.getElementById('result-desc').textContent = pick.desc;
    document.getElementById('result-meaning').textContent = pick.meaning ? 'משמעות: ' + pick.meaning : '';
    card.classList.add('visible');
  }, 100);
}

function addFavorite() {
  if (!currentName) return;
  const entry = { name: currentName.name, gender, category: currentName.category };
  if (!favorites.find(f => f.name === entry.name && f.gender === entry.gender)) {
    favorites.push(entry);
    localStorage.setItem('loyfer-favorites', JSON.stringify(favorites));
    renderFavorites();
  }
}

function removeFavorite(name, g) {
  favorites = favorites.filter(f => !(f.name === name && f.gender === g));
  localStorage.setItem('loyfer-favorites', JSON.stringify(favorites));
  renderFavorites();
}

function renderFavorites() {
  const section = document.getElementById('favorites-section');
  const list = document.getElementById('fav-list');
  if (favorites.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = '';
  favorites.forEach(f => {
    const chip = document.createElement('span');
    chip.className = 'fav-chip';
    chip.textContent = (f.gender === 'girl' ? '\u2640 ' : '\u2642 ') + f.name + ' Loyfer';
    chip.title = 'Click to remove';
    chip.onclick = () => removeFavorite(f.name, f.gender);
    list.appendChild(chip);
  });
}

init();
